apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: {{ include "quay-tam.fullname" . }}-quay-registry
  labels:
    {{- include "quay-tam.labels" . | nindent 4 }}
spec:
  components:
    - kind: clair
      managed: true
    - kind: postgres
      managed: true
    - kind: objectstorage
      managed: false
    - kind: redis
      managed: true
    - kind: horizontalpodautoscaler
      managed: true
    - kind: route
      managed: true
    - kind: mirror
      managed: true
    - kind: monitoring
      managed: true
    - kind: tls
      managed: true
    - kind: quay
      managed: true
    - kind: clairpostgres
      managed: true
  configBundleSecret: {{ include "quay-tam.fullname" . }}-config-bundle