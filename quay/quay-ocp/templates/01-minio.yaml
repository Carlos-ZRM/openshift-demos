---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ include "quay-tam.fullname" . }}-minio-pvc
  labels:
    {{- include "quay-tam.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.minio_config.pvc.accessMode }}
  resources:
    requests:
      storage: {{ .Values.minio_config.pvc.size }}
  volumeMode: {{ .Values.minio_config.pvc.volumeMode }}
---
kind: Secret
apiVersion: v1
metadata:
  name: {{ include "quay-tam.fullname" . }}-minio-secret
  labels:
    {{- include "quay-tam.labels" . | nindent 4 }}
stringData:
  # change the username and password to your own values.
  # ensure that the user is at least 3 characters long and the password at least 8
  minio_root_user: {{ .Values.minio_config.secret.access_key }}
  minio_root_password: {{ .Values.minio_config.secret.secret_key }}
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ include "quay-tam.fullname" . }}-minio-deploy
  labels:
    {{- include "quay-tam.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "quay-tam.fullname" . }}-app-minio
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: {{ include "quay-tam.fullname" . }}-app-minio
        {{- include "quay-tam.labels" . | nindent 8 }}
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "quay-tam.fullname" . }}-minio-pvc
      containers:
        - resources:
            {{- toYaml .Values.minio_config.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          terminationMessagePath: /dev/termination-log
          name: minio
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "quay-tam.fullname" . }}-minio-secret
                  key: minio_root_user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "quay-tam.fullname" . }}-minio-secret
                  key: minio_root_password
          ports:
            - containerPort: 9000
              protocol: TCP
            - containerPort: 9090
              protocol: TCP
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: minio
          terminationMessagePolicy: File
          image: >-
            quay.io/minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - :9090
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
---
kind: Service
apiVersion: v1
metadata:
  name: {{ include "quay-tam.fullname" . }}-minio-svc
  labels:
    {{- include "quay-tam.labels" . | nindent 4 }}
spec:
  ipFamilies:
    - IPv4
  ports:
    - name: api
      protocol: TCP
      port: 9000
      targetPort: 9000
    - name: ui
      protocol: TCP
      port: 9090
      targetPort: 9090
  internalTrafficPolicy: Cluster
  type: ClusterIP
  ipFamilyPolicy: SingleStack
  sessionAffinity: None
  selector:
    app: {{ include "quay-tam.fullname" . }}-app-minio
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: {{ include "quay-tam.fullname" . }}-minio-route-api
  labels:
    {{- include "quay-tam.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: {{ include "quay-tam.fullname" . }}-minio-svc
    weight: 100
  port:
    targetPort: api
  wildcardPolicy: None
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: {{ include "quay-tam.fullname" . }}-minio-route-ui
  labels:
    {{- include "quay-tam.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: {{ include "quay-tam.fullname" . }}-minio-svc
    weight: 100
  port:
    targetPort: ui
  wildcardPolicy: None
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect