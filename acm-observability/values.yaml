# Default values for quay-tam.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.


minio_config:
  pvc:
    storageClassName: ""
    accessMode: ReadWriteOnce
    size: 40Gi
    volumeMode: Filesystem
  secret:
    access_key: minio
    secret_key: minio123.
    bucket_name: acm-observability
  resources:
    limits:
      cpu: 250m
      memory: 1Gi
    requests:
      cpu: 20m
      memory: 100Mi
  region: us-east-1
  use_ssl: "false"


acm_observ_config:
  namespace: open-cluster-management-observability
  docker_config_secret: ""

ocp_config:
  domain: apps.cluster-gvkm2.dynamic.redhatworkshops.io