apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-ingress-operator
  namespace: openshift-gitops
spec:
  project: default
  sources:
    - repoURL: 'git@gitlab.com:xpk/openshift-apps.git'
      path: node-ingress-firewall-kustomize/overlays/dev
      targetRevision: main
  destination:
    server: "https://kubernetes.default.svc"
    namespace: openshift-ingress-node-firewall
  syncPolicy:
    automated:
      prune: true        # elimina recursos que ya no están en Git
      selfHeal: true     # corrige cambios manuales fuera de Git
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
